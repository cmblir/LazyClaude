name: Publish lazyclaw to npm

# Auto-publishes the lazyclaw CLI to npmjs.org whenever the
# `version` field in src/lazyclaw/package.json changes on main.
# A push that doesn't bump the version is a no-op — npm rejects
# duplicate versions anyway, so the version-change gate just
# avoids surfacing a confusing failure on every commit.
#
# Required repo secret: NPM_TOKEN — granular access token with
# "Bypass 2FA for publishing" enabled, scoped to the lazyclaw
# package, since CI can't satisfy interactive 2FA.

on:
  push:
    branches: [main]
    paths:
      - "src/lazyclaw/**"

permissions:
  contents: read
  # id-token: write is what `npm publish --provenance` needs so npm
  # can stamp the published tarball with a verifiable link back to
  # this exact workflow run. If provenance turns out to fail in your
  # setup (e.g. a token without provenance support), drop the
  # --provenance flag from the publish step below.
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Need the previous commit so we can diff package.json#version.
          fetch-depth: 2

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          # registry-url intentionally omitted — we write ~/.npmrc
          # manually below so we can trim secret whitespace before
          # the token reaches the Authorization header.

      - name: Detect version change
        id: detect
        run: |
          set -eu
          PKG=src/lazyclaw/package.json
          NEW=$(jq -r '.version' "$PKG")
          # Previous version on main from HEAD~1. Empty string when the
          # file didn't exist yet (first introduction = fresh publish).
          OLD=$(git show "HEAD~1:$PKG" 2>/dev/null | jq -r '.version // ""' || echo "")
          echo "old=$OLD" >> "$GITHUB_OUTPUT"
          echo "new=$NEW" >> "$GITHUB_OUTPUT"
          if [ "$OLD" = "$NEW" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "ℹ️ version unchanged ($NEW) — skip publish"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "✅ version $OLD → $NEW — will publish"
          fi

      - name: Verify the new version isn't already on npm
        if: steps.detect.outputs.changed == 'true'
        run: |
          set -eu
          NEW="${{ steps.detect.outputs.new }}"
          # `npm view` exits 0 with the version printed when the version
          # exists, exits non-zero (E404) when it doesn't.
          if npm view "lazyclaw@$NEW" version >/dev/null 2>&1; then
            echo "✗ lazyclaw@$NEW already published — bump the version"
            exit 1
          fi
          echo "✓ lazyclaw@$NEW is unpublished — proceeding"

      - name: Configure npm auth (trim, write .npmrc)
        if: steps.detect.outputs.changed == 'true'
        env:
          RAW_NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -eu
          # GitHub's secret-paste UI sometimes preserves a trailing
          # newline / CR / spaces from the source. setup-node's
          # `${NODE_AUTH_TOKEN}` substitution then writes that
          # whitespace into ~/.npmrc verbatim, and npm later builds
          # an Authorization header containing the whitespace, which
          # the registry rejects with:
          #
          #   *** is not a legal HTTP header value
          #
          # (the *** is GitHub masking the secret value in logs).
          # Strip it defensively so a slightly-dirty secret doesn't
          # block the release. We mask the cleaned token so the trim
          # output never appears in CI logs.
          CLEAN=$(printf '%s' "$RAW_NPM_TOKEN" | tr -d '[:space:]')
          if [ -z "$CLEAN" ]; then
            echo "✗ NPM_TOKEN secret is empty — set it under Settings → Secrets → Actions"
            exit 1
          fi
          echo "::add-mask::$CLEAN"
          # Diagnostic-but-not-leaky: print the secret's byte length
          # and the npm-token prefix family. A genuine `npm_` token
          # is ~36–44 bytes; a truncated paste shows up as a wildly
          # different number. Granular access tokens always start
          # with `npm_`; classic / legacy tokens are bare hex. If
          # the prefix is anything else the token isn't an npm
          # token at all (wrong field, wrong service).
          BYTES=${#CLEAN}
          PREFIX=$(printf '%s' "$CLEAN" | head -c 4)
          case "$PREFIX" in
            npm_*) FAMILY="granular/automation (modern)";;
            *)     FAMILY="classic-hex or unknown — verify on npmjs.com → Access Tokens";;
          esac
          echo "ℹ NPM_TOKEN length: $BYTES bytes · prefix family: $FAMILY"
          # Write the registry .npmrc directly so we don't rely on
          # setup-node's env-substitution path. Quote-free, single
          # line, terminating LF only.
          printf '//registry.npmjs.org/:_authToken=%s\n' "$CLEAN" > "$HOME/.npmrc"
          chmod 600 "$HOME/.npmrc"
          # Sanity probe — `npm whoami` exits 0 and prints the
          # account when auth is valid; otherwise it errors clearly.
          # Capture the failure so we can append a self-service hint.
          if ! WHOAMI=$(npm whoami 2>&1); then
            echo "✗ npm whoami failed:"
            printf '%s\n' "$WHOAMI"
            echo ""
            echo "Most likely causes of E401 here:"
            echo "  1. Token was revoked (npm auto-revokes if it appeared publicly)"
            echo "  2. Token expired (granular tokens have a max lifetime)"
            echo "  3. Token was truncated when pasted into the GitHub secret —"
            echo "     compare the byte-count above to what npmjs.com showed when"
            echo "     you created it"
            echo "  4. Token belongs to a different npm account that doesn't own"
            echo "     the lazyclaw package"
            echo ""
            echo "To verify locally without exposing the token in logs:"
            echo '  echo "//registry.npmjs.org/:_authToken=<paste-token>" > /tmp/npmrc.test'
            echo "  npm --userconfig=/tmp/npmrc.test whoami"
            echo "  rm /tmp/npmrc.test"
            echo ""
            echo "If the local check returns your username, re-paste the token"
            echo "into the GitHub Secret cleanly. If it also 401s, create a fresh"
            echo "granular access token at npmjs.com → Access Tokens → Granular"
            echo "with: Packages = lazyclaw (read & write, Bypass 2FA enabled),"
            echo "Expiration ≥ 30 days, then update the GitHub Secret."
            exit 1
          fi
          echo "✓ npm whoami: $WHOAMI"

      - name: Publish
        if: steps.detect.outputs.changed == 'true'
        working-directory: src/lazyclaw
        run: |
          set -eu
          # --provenance requires the token to be a granular access
          # token associated with this repo on npmjs.com. If the
          # token doesn't support provenance, publish errors before
          # the upload — set PROVENANCE=0 in repo Variables to
          # disable. Defaults on so verifiable publishes are the
          # norm rather than the exception.
          if [ "${PROVENANCE:-1}" = "1" ]; then
            npm publish --access public --provenance
          else
            npm publish --access public
          fi
          echo "🚀 published lazyclaw@${{ steps.detect.outputs.new }}"
        env:
          PROVENANCE: ${{ vars.PROVENANCE }}
